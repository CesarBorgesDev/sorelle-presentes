# PostgreSQL + API + Frontend React em Docker (Nginx aaPanel faz proxy → :3000 e /api → :3001)
# Uso: bash deploy/aapanel/install-docker.sh
#
# DATABASE_URL em server/.env usa 127.0.0.1 (host VPS). Dentro do Docker vira "db" via entrypoint.

services:
  db:
    image: postgres:15-alpine
    container_name: sorelle-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: sorelle
    volumes:
      - sorelle_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sorelle"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sorelle

  backend:
    build:
      context: ../../server
      dockerfile: Dockerfile
    container_name: sorelle-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - ../../server/.env
    environment:
      DOCKER_DB_HOST: db
    volumes:
      - sorelle_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"
    networks:
      - sorelle

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.production
      args:
        VITE_API_URL: /api
    container_name: sorelle-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sorelle

volumes:
  sorelle_pg_data:
  sorelle_uploads:

networks:
  sorelle:
    driver: bridge
